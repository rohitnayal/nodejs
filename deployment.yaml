apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      imagePullSecrets:
        - name: nexus-cred
      containers:
        - name: demo-app
          image: localhost:8083/demo-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000